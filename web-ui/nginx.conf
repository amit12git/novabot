# In dev, vite.config.js proxied /api -> localhost:8000.
# In containers, nginx plays that role: /api -> query-service:8000.
# Note "query-service" is the docker-compose service name — Docker's
# internal DNS resolves it to the container's IP.

# /api/*    -> query-service:8000   (chat, history)
# /ingest/* -> ingestion-service:8100 (upload, documents)

server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://query-service:8000/;
        proxy_set_header Host $host;
        proxy_read_timeout 180s;
    }

    location /ingest/ {
        proxy_pass http://ingestion-service:8100/;
        proxy_set_header Host $host;
        client_max_body_size 25m;      # allow PDF uploads
        proxy_read_timeout 120s;       # embedding can take a moment
    }
}